:root{--bg:#0C1A16;--panel:#122620;--panel2:#16302A;--line:#24433A;--line2:#2F564A;--chalk:#ECF5EF;--muted:#8FAEA2;--faint:#5E7A70;--grass:#58C281;--gold:#E9C46A;--clay:#E07A6B;--display:'Saira Condensed','Arial Narrow',Arial,sans-serif;--body:'IBM Plex Sans',-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;}

html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:var(--bg);color:var(--chalk);font-family:var(--body);font-size:15px;line-height:1.45;background-image:radial-gradient(circle at 50% -140px, rgba(88,194,129,.10), transparent 380px),linear-gradient(rgba(236,245,239,.022) 1px, transparent 1px);background-size:auto, 100% 56px;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;-webkit-appearance:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 14px 60px}
header{position:relative;padding:26px 0 14px;overflow:hidden}

header h1{font-family:var(--display);font-weight:800;font-size:clamp(34px,6vw,52px);letter-spacing:.5px;line-height:.95;text-transform:uppercase}
header h1 .y{color:var(--gold)}
header .sub{color:var(--muted);font-size:13.5px;margin-top:6px;max-width:640px}
.headrow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;position:relative}
.gear{border:1px solid var(--line2);border-radius:9px;padding:8px 13px;font-size:13px;color:var(--chalk);background:var(--panel);white-space:nowrap}
.gear:hover{border-color:var(--grass)}
#paramsBar{display:none;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px 16px;margin:12px 0 4px}
#paramsBar.open{display:block}
.params{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px 22px}
.param label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:5px}
.param label b{color:var(--chalk);font-family:var(--mono);font-weight:600}
input[type=range]{width:100%;accent-color:var(--grass);height:22px}
select{background:var(--panel2);color:var(--chalk);border:1px solid var(--line2);border-radius:8px;padding:7px 9px;font-size:13px;width:100%}
.params-note{color:var(--faint);font-size:12px;margin-top:10px}
.ioBar{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.ioBtn{border:1px solid var(--line2);border-radius:8px;padding:8px 14px;font-size:12.5px;color:var(--muted);background:var(--panel2)}
.ioBtn:hover{border-color:var(--grass);color:var(--chalk)}
.ioBtn:active{transform:scale(.98)}
#importFile{display:none}
#statusBar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px 14px;margin:12px 0 18px;font-size:13px}
#statusTxt{color:var(--muted)} #statusTxt b{color:var(--chalk);font-family:var(--mono);font-weight:600}
#consTxt{color:var(--gold)}
#clearCons{border:1px solid var(--line2);border-radius:7px;padding:4px 10px;font-size:12px;color:var(--muted)}
#clearCons:hover{color:var(--clay);border-color:var(--clay)}
