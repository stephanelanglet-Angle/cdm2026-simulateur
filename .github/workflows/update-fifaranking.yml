name: Maj classement FIFA

# Met a jour fifa.json (rang + points du Classement mondial FIFA) chaque jour.
# Critere de departage ultime (Art.13, etape 3). Le classement officiel ne bouge que
# ~6-8x/an, mais un run quotidien garantit qu'on a toujours la derniere publication.
# Declenchable a la main (onglet Actions -> Run workflow).
on:
  schedule:
    # Quotidien, minute decalee (pas a l'heure ronde : creneau congestionne chez GitHub).
    - cron: '41 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Recuperer le classement FIFA
        run: node scripts/update-fifaranking.mjs
      - name: Committer si changement
        run: |
          if [ -n "$(git status --porcelain fifa.json)" ]; then
            git config user.name "fifa-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add fifa.json
            git commit -m "chore: maj classement FIFA ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Aucun changement classement FIFA."
          fi
