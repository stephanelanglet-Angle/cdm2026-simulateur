name: Maj Elo (eloratings.net)

# Met à jour elo.json chaque jour depuis eloratings.net.
# Déclenchable aussi à la main (onglet Actions -> Run workflow).
on:
  schedule:
    # Minutes décalées (pas à l'heure ronde : créneau congestionné chez GitHub,
    # les runs planifiés y sont souvent retardés ou abandonnés). 3x/jour pour
    # rattraper les Elo après les fenêtres de matchs (matin / après-midi / soir UTC).
    - cron: '23 5,13,21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Récupérer les Elo
        run: node scripts/update-elo.mjs
      - name: Committer si changement
        run: |
          if [ -n "$(git status --porcelain elo.json)" ]; then
            git config user.name "elo-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add elo.json
            git commit -m "chore: maj Elo eloratings.net ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Aucun changement Elo aujourd'hui."
          fi
